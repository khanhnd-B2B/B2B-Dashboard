name: Auto Update Data

on:
  schedule:
    # Chạy mỗi 4 tiếng (theo giờ UTC, GitHub Actions dùng giờ UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Run fetch_data.py
        run: python fetch_data.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add master_data.csv
          git status
          if ! git diff --staged --quiet; then
            git commit -m "Auto-update data from Google Sheets"
            git push origin HEAD:main
          else
            echo "No changes to commit"
          fi
